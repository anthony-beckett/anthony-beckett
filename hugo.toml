baseurl = "https://anthony-beckett.github.io/"
enableEmoji = true
footnotereturnlinkcontents = "↩"
googleAnalytics = ""
ignoreFiles = ["\\.Rmd$", "_files$", "_cache$"]
languageCode = "en-us"
theme = "hugo-classic"
title = "AJBeckett"

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
anchorLineNos = false
codeFences = true
guessSyntax = false
hl_Lines = ""
lineAnchors = ""
lineNoStart = 1
lineNos = false
lineNumbersInTable = true
noClasses = true
style = "monokai"
tabWidth = 4

[permalinks]
post = "/post/:year/:month/:day/:slug/"

[[menu.main]]
name = "Categories"
url = "/categories/"
weight = 1
[[menu.main]]
name = "Tags"
url = "/tags/"
weight = 2

[params]
custom_css = ["css/theme-override.css"]
description = "A simple, minimal blog for those who love text."
footer = "[github](https://github.com/anthony-beckett) | [linkedin](https://linkedin.com/in/anthony-beckett)"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[mediaTypes]
  [mediaTypes."image/webp"]
    suffixes = ["webp"]

[outputFormats]
  [outputFormats.WEBP]
    mediaType = "image/webp"
    isPathCaseSensitive = true
